  <body>
    <div id="root"></div>

    <script>
      // Wait for DOM to be fully loaded, then run with highest priority
      document.addEventListener("DOMContentLoaded", function () {
        // Use setTimeout to ensure this runs after all other DOMContentLoaded listeners
        setTimeout(function () {
          // Force hide the lovable badge - override any other scripts
          var badge = document.getElementById("lovable-badge");
          if (badge) {
            badge.style.setProperty("display", "none", "important");
            badge.style.setProperty("visibility", "hidden", "important");
            badge.style.setProperty("opacity", "0", "important");
            badge.style.setProperty("z-index", "-9999", "important");
          }

          // Also hide any potential lovable badge variations
          var badges = document.querySelectorAll(
            '[id*="lovable"], [class*="lovable"]',
          );
          badges.forEach(function (el) {
            if (el.id.includes("badge") || el.className.includes("badge")) {
              el.style.setProperty("display", "none", "important");
              el.style.setProperty("visibility", "hidden", "important");
              el.style.setProperty("opacity", "0", "important");
              el.style.setProperty("z-index", "-9999", "important");
            }
          });
        }, 0);
      });

      // Also run immediately in case DOM is already loaded
      (function () {
        var badge = document.getElementById("lovable-badge");
        if (badge) {
          badge.style.setProperty("display", "none", "important");
          badge.style.setProperty("visibility", "hidden", "important");
          badge.style.setProperty("opacity", "0", "important");
          badge.style.setProperty("z-index", "-9999", "important");
        }
      })();
    </script>
